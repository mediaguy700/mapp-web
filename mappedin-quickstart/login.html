<!DOCTYPE html>
<html lang="en">
  <head>
    <title>IntraMap - Sign In</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%;
        height: 100%;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      .login-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 48px;
        position: relative;
        background: linear-gradient(165deg, #475569 0%, #64748b 40%, #475569 100%);
      }
      .login-bg {
        position: absolute;
        inset: -10%;
        background: url('./splash-map-bg.png') center center no-repeat;
        background-size: cover;
        animation: login-pan 30s ease-in-out infinite;
        opacity: 0.32;
        filter: brightness(0.95) contrast(1.4) saturate(1.2);
        backface-visibility: hidden;
        -webkit-backface-visibility: hidden;
      }
      .login-bg::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(71,85,105,0.2) 0%, transparent 40%, rgba(71,85,105,0.25) 100%);
      }
      .login-bg::after {
        content: '';
        position: absolute;
        inset: 0;
        background: radial-gradient(ellipse 80% 80% at 50% 50%, transparent 40%, rgba(71,85,105,0.4) 100%);
      }
      @keyframes login-pan {
        0%, 100% { transform: scale(1) translate(0, 0) translateZ(0); }
        25% { transform: scale(1.05) translate(2%, 1%) translateZ(0); }
        50% { transform: scale(1.08) translate(-1%, 2%) translateZ(0); }
        75% { transform: scale(1.05) translate(1%, -1%) translateZ(0); }
      }
      .login-page .login-card {
        position: relative;
        z-index: 1;
      }
      .login-card {
        width: 100%;
        max-width: 420px;
        background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
        border-radius: 24px;
        border: 1px solid rgba(255,255,255,0.9);
        box-shadow: 0 8px 32px rgba(0,0,0,0.1), 0 0 0 1px rgba(14,165,233,0.1);
        padding: 28px 40px 44px;
        animation: login-card-appear 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      @keyframes login-card-appear {
        from { opacity: 0; transform: translateY(20px) scale(0.96); }
        to { opacity: 1; transform: translateY(0) scale(1); }
      }
      .login-form label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: #1f2937;
        margin-bottom: 8px;
        letter-spacing: 0.01em;
      }
      .login-form input {
        width: 100%;
        padding: 14px 16px;
        font-size: 15px;
        border: 2px solid #e2e8f0;
        border-radius: 14px;
        margin-bottom: 16px;
        background: #fff;
        color: #111827;
        transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .login-form input:hover {
        border-color: #bae6fd;
        box-shadow: 0 0 0 3px rgba(56,189,248,0.15);
      }
      .login-form input:focus {
        outline: none;
        border-color: #0ea5e9;
        background: #fff;
        box-shadow: 0 0 0 4px rgba(56,189,248,0.2);
      }
      .login-form input::placeholder {
        color: #9ca3af;
      }
      .login-error {
        display: none;
        color: #dc2626;
        font-size: 13px;
        margin-bottom: 12px;
        padding: 10px 14px;
        background: #fef2f2;
        border-radius: 10px;
        border: 1px solid #fecaca;
      }
      .login-btn {
        width: 100%;
        padding: 14px 24px;
        font-size: 15px;
        font-weight: 600;
        color: #fff;
        background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
        border: none;
        border-radius: 14px;
        cursor: pointer;
        transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        margin-top: 8px;
        box-shadow: 0 4px 14px rgba(14,165,233,0.35);
      }
      .login-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(14,165,233,0.45);
      }
      .login-btn:active {
        transform: translateY(0);
      }
      .login-footer {
        margin-top: 24px;
        text-align: center;
      }
      .login-footer a {
        color: #6b7280;
        font-size: 13px;
        text-decoration: none;
        transition: color 0.15s ease;
      }
      .login-footer a:hover {
        color: #0ea5e9;
      }
      .login-logo {
        margin-bottom: -4px;
        text-align: center;
      }
      .login-logo img {
        height: 220px;
        width: auto;
        display: inline-block;
      }
      @media (max-width: 768px) {
        .login-page { padding: 24px; }
      }
    </style>
  </head>
  <body>
    <div class="login-page">
      <div class="login-bg" aria-hidden="true"></div>
      <div class="login-card">
        <div class="login-logo">
          <img src="./intramap-logo.png" alt="IntraMap SYSTEMS" onerror="this.style.display='none'; if(this.nextElementSibling) this.nextElementSibling.style.display='flex';" />
          <div class="login-logo-fallback" style="display:none; flex-direction:column; align-items:center; gap:8px;">
              <svg width="147" height="220" viewBox="0 0 24 36" fill="none"><path d="M12 0C5.4 0 0 5.4 0 12c0 9 12 24 12 24s12-15 12-24c0-6.6-5.4-12-12-12z" fill="#0284c7"/><circle cx="12" cy="12" r="5" fill="white"/></svg>
            <span style="font:600 18px Inter,sans-serif; color:#0f172a;">IntraMap Systems</span>
          </div>
        </div>
        <form class="login-form" id="login-form">
          <div id="login-error" class="login-error" role="alert"></div>
          <input type="text" id="username" name="username" placeholder="Username" required autocomplete="username" />
          <input type="password" id="password" name="password" placeholder="Password" required autocomplete="current-password" />
          <button type="submit" class="login-btn">Sign in</button>
        </form>
        <div class="login-footer">
          <a href="#">Forgot password?</a>
        </div>
      </div>
    </div>
    <script type="module" src="/src/login.ts"></script>
  </body>
</html>
