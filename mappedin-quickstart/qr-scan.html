<!DOCTYPE html>
<html lang="en">
  <head>
    <title>IntraMap - Scan QR Code</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%;
        min-height: 100vh;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: linear-gradient(165deg, #1e293b 0%, #0f172a 50%, #020617 100%);
        color: #f8fafc;
      }
      .qr-page {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .qr-header {
        text-align: center;
        margin-bottom: 24px;
      }
      .qr-header h1 {
        font-size: 24px;
        font-weight: 700;
        color: #f8fafc;
        margin-bottom: 8px;
      }
      .qr-header p {
        font-size: 14px;
        color: #94a3b8;
      }
      .qr-scanner-wrap {
        width: 100%;
        max-width: 280px;
        aspect-ratio: 1;
        border-radius: 20px;
        overflow: hidden;
        background: #0f172a;
        border: 2px solid rgba(14, 165, 233, 0.3);
        box-shadow: 0 0 40px rgba(14, 165, 233, 0.15);
        margin-bottom: 24px;
      }
      #qr-reader {
        width: 100% !important;
        height: 100% !important;
      }
      #qr-reader video {
        border-radius: 18px;
      }
      .qr-result {
        width: 100%;
        max-width: 280px;
        padding: 20px;
        background: rgba(34, 197, 94, 0.1);
        border: 1px solid rgba(34, 197, 94, 0.3);
        border-radius: 14px;
        margin-bottom: 24px;
        display: none;
      }
      .qr-result.show {
        display: block;
      }
      .qr-result h3 {
        font-size: 14px;
        font-weight: 600;
        color: #22c55e;
        margin-bottom: 8px;
      }
      .qr-result pre {
        font-size: 12px;
        color: #e2e8f0;
        white-space: pre-wrap;
        word-break: break-all;
      }
      .qr-error {
        padding: 16px;
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.3);
        border-radius: 12px;
        color: #fca5a5;
        font-size: 14px;
        margin-bottom: 24px;
        display: none;
      }
      .qr-error.show {
        display: block;
      }
      .qr-scanner-input-wrap {
        width: 100%;
        max-width: 280px;
        margin-bottom: 24px;
      }
      .qr-scanner-input-wrap label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        color: #94a3b8;
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .qr-scanner-input-wrap input {
        width: 100%;
        padding: 14px 16px;
        font-size: 16px;
        font-family: 'SF Mono', 'Monaco', ui-monospace, monospace;
        background: rgba(15, 23, 42, 0.6);
        border: 2px solid rgba(14, 165, 233, 0.3);
        border-radius: 12px;
        color: #f8fafc;
        outline: none;
      }
      .qr-scanner-input-wrap input:focus {
        border-color: #0ea5e9;
        box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.2);
      }
      .qr-scanner-input-wrap input::placeholder {
        color: #64748b;
      }
      .qr-back {
        padding-top: 24px;
      }
      .qr-back a {
        color: #94a3b8;
        font-size: 14px;
        text-decoration: none;
        transition: color 0.2s;
      }
      .qr-back a:hover {
        color: #0ea5e9;
      }
    </style>
  </head>
  <body>
    <div class="qr-page">
      <header class="qr-header">
        <h1>Scan QR Code</h1>
        <p>Position a QR code within the frame to scan</p>
      </header>

      <div id="qr-reader" class="qr-scanner-wrap"></div>

      <div class="qr-scanner-input-wrap">
        <label for="qr-scanner-input">Or use USB/attached scanner</label>
        <input type="text" id="qr-scanner-input" placeholder="Focus here and scan with USB scanner..." autocomplete="off" />
      </div>

      <div id="qr-error" class="qr-error" role="alert"></div>

      <div id="qr-result" class="qr-result">
        <h3>Scanned successfully</h3>
        <pre id="qr-result-text"></pre>
      </div>

      <div class="qr-back">
        <a href="./index.html">← Back to map</a>
      </div>
    </div>
    <script type="module" src="/src/qr-scan.ts"></script>
  </body>
</html>
