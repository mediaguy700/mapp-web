<!DOCTYPE html>
<html lang="en">
  <head>
    <title>IntraMap</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      .splash {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(165deg, #475569 0%, #64748b 40%, #475569 100%);
        position: relative;
      }
      .splash-bg {
        position: absolute;
        inset: -10%;
        background: url('./splash-map-bg.png') center center no-repeat;
        background-size: cover;
        animation: splash-pan 30s ease-in-out infinite;
        opacity: 0.32;
        filter: brightness(0.95) contrast(1.4) saturate(1.2);
        backface-visibility: hidden;
        -webkit-backface-visibility: hidden;
      }
      .splash-bg::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(71,85,105,0.2) 0%, transparent 40%, rgba(71,85,105,0.25) 100%);
      }
      .splash-bg::after {
        content: '';
        position: absolute;
        inset: 0;
        background: radial-gradient(ellipse 80% 80% at 50% 50%, transparent 40%, rgba(71,85,105,0.4) 100%);
      }
      @keyframes splash-pan {
        0%, 100% { transform: scale(1) translate(0, 0) translateZ(0); }
        25% { transform: scale(1.05) translate(2%, 1%) translateZ(0); }
        50% { transform: scale(1.08) translate(-1%, 2%) translateZ(0); }
        75% { transform: scale(1.05) translate(1%, -1%) translateZ(0); }
      }
      .splash-content {
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        z-index: 1;
      }
    </style>
  </head>
  <body>
    <div class="splash">
      <div class="splash-bg" aria-hidden="true"></div>
      <div class="splash-content"></div>
    </div>
    <script>
      setTimeout(() => {
        window.location.href = './login.html';
      }, 30000);
    </script>
  </body>
</html>
